<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sourdough Master</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b2a22">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container" class="game-container select-none">
        <!-- Floor background -->
        <div class="floor"></div>

        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <img id="start-img" src="start_screen.png" alt="Start Screen" class="full-screen-img">
            <div class="tap-to-start">TAP TO START</div>
        </div>

        <!-- Main Game Screen -->
        <div id="game-screen" class="screen">
            <!-- Top HUD -->
            <div class="hud-top">
                <div class="hud-left">
                    <button id="restart-btn" class="pixel-btn restart-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                    </button>
                    <div id="state-title" class="state-title">ACTION 1</div>
                </div>
                <div id="timer-display" class="timer-box">00:00</div>
            </div>

            <!-- Main Content Area -->
            <div class="main-content">
                <div class="character-area">
                    <img id="character-img" src="eyes_open.png" alt="Character" class="character-sprite">
                </div>

                <div class="action-area">
                    <button id="action-btn" class="pixel-btn action-btn">
                        <img id="action-icon" src="temperature.png" alt="Action">
                        <div id="action-overlay" class="action-overlay hidden">
                            <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        </div>
                    </button>
                    <div id="action-label" class="action-label">TAP TO ACTION</div>
                </div>
            </div>

            <!-- Speech Bubble -->
            <div class="speech-container">
                <div class="speech-bubble pixel-border">
                    <p id="speech-text"></p>
                </div>
            </div>
        </div>

        <!-- Celebration Screen -->
        <div id="celebration-screen" class="screen">
            <div class="celebration-content">
                <img id="celebration-img" src="celebration.gif" alt="Celebration" class="celebration-gif">
                <h1 class="celebration-text">PERFECT BAKE!</h1>
            </div>
        </div>

        <!-- Restart Modal -->
        <div id="restart-modal" class="modal hidden">
            <div class="modal-content pixel-border">
                <p>Are you sure you want to cancel this bake?</p>
                <div class="modal-buttons">
                    <button id="confirm-yes" class="pixel-btn yes-btn">YES</button>
                    <button id="confirm-no" class="pixel-btn no-btn">NO</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="timer-sound" src="timer_complete.mp3"></audio>
    <audio id="celebration-sound" src="celebration_music.mp3"></audio>
    <audio id="click-sound" src="click.mp3"></audio>

    <script src="app.js"></script>
</body>
</html>
